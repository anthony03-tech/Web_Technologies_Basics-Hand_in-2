<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css-FirstPage.css" />
    <title>To-Do</title>
  </head>
  <body>
    <div class="container">
      <nav>
        <a href="./FirstPage_To-do-list.html" class="active">Tasks</a>
        <a href="./SecondPage_account.html">Account</a>
        <a href="./ThirdPage_Settings.html">Settings</a>
      </nav>

      <h1>To<span>-</span>Do</h1>
      <p class="subtitle">Click a task to mark it complete</p>

      <p class="section-label">Today</p>
      <ul class="todo-list">
        <li class="todo-item">
          <input type="checkbox" id="item1" />
          <label for="item1"
            >Review project proposal
            <span class="badge urgent">urgent</span></label
          >
        </li>
        <li class="todo-item">
          <input type="checkbox" id="item2" />
          <label for="item2"
            >Reply to pending emails <span class="badge">normal</span></label
          >
        </li>
        <li class="todo-item">
          <input type="checkbox" id="item3" />
          <label for="item3"
            >Buy groceries <span class="badge">normal</span></label
          >
        </li>
        <li class="todo-item">
          <input type="checkbox" id="item4" />
          <label for="item4"
            >Morning run <span class="badge">normal</span></label
          >
        </li>
      </ul>

      <p class="section-label">This week</p>
      <ul class="todo-list">
        <li class="todo-item">
          <input type="checkbox" id="item5" />
          <label for="item5"
            >Finish reading chapter 4 <span class="badge">normal</span></label
          >
        </li>
        <li class="todo-item">
          <input type="checkbox" id="item6" />
          <label for="item6"
            >Schedule dentist appointment
            <span class="badge urgent">urgent</span></label
          >
        </li>
        <li class="todo-item">
          <input type="checkbox" id="item7" />
          <label for="item7"
            >Clean the apartment <span class="badge">normal</span></label
          >
        </li>
        <li class="todo-item">
          <input type="checkbox" id="item8" />
          <label for="item8"
            >Pay electricity bill <span class="badge">normal</span></label
          >
        </li>
      </ul>
    </div>
  </body>
</html>
